<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CheapBugs v2</title>
  </head>
  <body>
    <script>
      (() => {
        const hostname = window.location.hostname;
        const parts = window.location.pathname.split("/").filter(Boolean);
        const isGithubProjectPage = hostname.endsWith(".github.io") && parts.length > 0;
        const basePath = isGithubProjectPage ? `/${parts[0]}/` : "/";
        const routeParts = isGithubProjectPage ? parts.slice(1) : parts.slice();

        if (routeParts[routeParts.length - 1] === "404.html") {
          routeParts.pop();
        }

        const route = `/${routeParts.join("/")}`.replace(/\/+$/, "") || "/";
        window.location.replace(`${basePath}#${route}${window.location.search}${window.location.hash}`);
      })();
    </script>
  </body>
</html>
