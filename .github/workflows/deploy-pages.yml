name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          VITE_ROUTER_MODE: hash
          VITE_APP_NAME: ${{ vars.VITE_APP_NAME }}
          VITE_THIRDWEB_CLIENT_ID: ${{ vars.VITE_THIRDWEB_CLIENT_ID }}
          VITE_CHAIN_ID: ${{ vars.VITE_CHAIN_ID }}
          VITE_CHAIN_NAME: ${{ vars.VITE_CHAIN_NAME }}
          VITE_CHAIN_RPC_URL: ${{ vars.VITE_CHAIN_RPC_URL }}
          VITE_CHAIN_NATIVE_SYMBOL: ${{ vars.VITE_CHAIN_NATIVE_SYMBOL }}
          VITE_CHAIN_BLOCK_EXPLORER_URL: ${{ vars.VITE_CHAIN_BLOCK_EXPLORER_URL }}
          VITE_EAS_CONTRACT_ADDRESS: ${{ vars.VITE_EAS_CONTRACT_ADDRESS }}
          VITE_EAS_SCHEMA_REGISTRY_ADDRESS: ${{ vars.VITE_EAS_SCHEMA_REGISTRY_ADDRESS }}
          VITE_EAS_GRAPHQL_URL: ${{ vars.VITE_EAS_GRAPHQL_URL }}
          VITE_EAS_SCAN_URL: ${{ vars.VITE_EAS_SCAN_URL }}
          VITE_REVIEW_VERDICT_SCHEMA_UID: ${{ vars.VITE_REVIEW_VERDICT_SCHEMA_UID }}
          VITE_PAYOUT_RECORD_SCHEMA_UID: ${{ vars.VITE_PAYOUT_RECORD_SCHEMA_UID }}
          VITE_BUG_INDEX_ADDRESS: ${{ vars.VITE_BUG_INDEX_ADDRESS }}
          VITE_REVIEWER_ADDRESSES: ${{ vars.VITE_REVIEWER_ADDRESSES }}
          VITE_STORAGE_PROVIDER: ${{ vars.VITE_STORAGE_PROVIDER }}
          VITE_PINATA_PRESIGN_ENDPOINT: ${{ vars.VITE_PINATA_PRESIGN_ENDPOINT }}
          VITE_FEATURED_REPORT_IDS: ${{ vars.VITE_FEATURED_REPORT_IDS }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
